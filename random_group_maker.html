<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Random Group Maker</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f7f7fb;color:#111;display:grid;place-items:center;min-height:100vh}
  .card{background:#fff;box-shadow:0 8px 30px #0002;border-radius:24px;padding:28px;max-width:760px;width:92%;text-align:center}
  h1{font-size:clamp(28px,5vw,54px);margin:0 0 12px}.small{color:#555}.row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:18px 0}
  input,button{font-size:18px;padding:12px 14px;border-radius:12px;border:1px solid #ccc}input{width:110px}button{cursor:pointer;background:#111;color:white;border:none}
  #qr{width:min(62vw,360px);height:min(62vw,360px);margin:18px auto;display:block}.group{font-size:clamp(84px,22vw,180px);font-weight:900;margin:10px 0}.hidden{display:none}.url{word-break:break-all;background:#f1f1f5;border-radius:12px;padding:10px;font-size:14px}
</style>
</head>
<body>
<div class="card">
  <div id="host">
    <h1>Random Group Maker</h1>
    <p class="small">Set the number of groups, then show this QR code on screen.</p>
    <div class="row">
      <label>Groups: <input id="groups" type="number" min="2" max="99" value="6"></label>
      <button onclick="makeQR()">Make QR</button>
    </div>
    <img id="qr" alt="QR code will appear here">
    <p class="small">Scan link:</p><div id="scanUrl" class="url"></div>
  </div>

  <div id="participant" class="hidden">
    <h1>Your group number is</h1>
    <div id="groupNum" class="group"></div>
    <p class="small">Take a screenshot or remember this number.</p>
    <button onclick="resetMine()">Draw again</button>
  </div>
</div>

<script>
function params(){return new URLSearchParams(location.search)}
function participantUrl(){
  const g = Math.max(2, Math.min(99, parseInt(document.getElementById('groups').value || '2')));
  const u = new URL(location.href); u.search = '?join=1&groups=' + g; return u.toString();
}
function makeQR(){
  const u = participantUrl();
  document.getElementById('scanUrl').textContent = u;
  document.getElementById('qr').src = 'https://quickchart.io/qr?size=360&text=' + encodeURIComponent(u);
}
function showParticipant(){
  const g = Math.max(2, Math.min(99, parseInt(params().get('groups') || '2')));
  const key = 'randomGroup_' + g;
  let n = localStorage.getItem(key);
  if(!n){ n = String(Math.floor(Math.random()*g)+1); localStorage.setItem(key,n); }
  document.getElementById('host').classList.add('hidden');
  document.getElementById('participant').classList.remove('hidden');
  document.getElementById('groupNum').textContent = n;
}
function resetMine(){
  const g = Math.max(2, Math.min(99, parseInt(params().get('groups') || '2')));
  localStorage.removeItem('randomGroup_' + g); location.reload();
}
if(params().get('join') === '1') showParticipant(); else makeQR();
</script>
</body>
</html>
